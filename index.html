<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vuelve | El camino a casa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-mascota { border-radius: 15px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-float { position: fixed; bottom: 20px; right: 20px; border-radius: 50%; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    </style>
</head>
<body class="bg-gray-50 pb-20">

    <header class="bg-blue-600 text-white p-4 text-center shadow-md">
        <h1 class="text-2xl font-bold italic">Vuelve</h1>
        <p class="text-xs">Alertas de mascotas en Cali</p>
    </header>

    <div class="p-4 bg-white sticky top-0 z-10 shadow-sm">
        <select id="filtroBarrio" class="w-full p-2 border rounded-lg bg-gray-100 text-sm">
            <option value="todos">Todos los barrios de Cali</option>
            <option value="sur">Sur (Pance, Valle del Lili, Caney)</option>
            <option value="norte">Norte (Vipasa, La Flora)</option>
            <option value="oeste">Oeste (San Antonio, El Peñon)</option>
            <option value="centro">Centro y Oriente</option>
        </select>
    </div>

    <main class="p-4 grid grid-cols-1 gap-4" id="feedMascotas">
        <div class="card-mascota bg-white p-4">
            <span class="bg-red-100 text-red-600 px-2 py-1 rounded text-xs font-bold uppercase">🚨 Perdido</span>
            <div class="h-48 bg-gray-200 my-2 rounded-md flex items-center justify-center text-gray-400 italic">Foto de la mascota</div>
            <h2 class="font-bold text-lg text-gray-800">Labrador Dorado</h2>
            <p class="text-sm text-gray-600">Visto en: <b>Parque del Perro</b></p>
            <p class="text-xs text-gray-500 mt-1">"Tiene un collar azul, es muy dócil."</p>
            <a href="https://wa.me/573171261268" class="block mt-3 bg-green-500 text-white text-center py-2 rounded-lg font-bold">Contactar vía WhatsApp</a>
        </div>
    </main>

    <section class="p-4 mb-8">
        <div class="bg-yellow-50 border-2 border-yellow-200 p-4 rounded-xl text-center">
            <p class="text-sm text-yellow-800">¿Recuperaste a tu mejor amigo?</p>
            <button onclick="alert('Aquí conectarás tu QR de Nequi')" class="mt-2 text-blue-600 font-bold underline">Invítame un café (Nequi/Daviplata)</button>
        </div>
    </section>

    <button onclick="abrirFormulario()" class="btn-float bg-red-600 text-white font-bold">+</button>

    <script>
        function abrirFormulario() {
            const num = prompt("Introduce tu WhatsApp para que te contacten:");
            if(num) {
                alert("¡Perfecto! Se abrirá la cámara para subir la foto (Lógica de servidor necesaria para guardar permanentemente)");
                // Aquí se conectaría con una base de datos gratuita como Supabase o Firebase
            }
        }
    </script>
</body>
</html>
